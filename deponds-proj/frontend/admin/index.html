<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Earn — Admin Login</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    .admin-brand { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 0.2rem; }
    .admin-brand span { color: var(--accent); }
  </style>
</head>
<body>
  <div class="admin-auth-page">
    <div class="admin-auth-card">
      <div class="admin-auth-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
      </div>
      <div class="admin-brand">Simple <span>Earn</span></div>
      <p style="font-size:.8rem;color:var(--text-muted);margin-bottom:1.5rem;">Administration Panel — Restricted Access</p>

      <div style="display:flex;flex-direction:column;gap:0.875rem;">
        <div class="form-group">
          <label class="form-label">Admin Username</label>
          <input class="form-control" type="text" id="adm-username" placeholder="admin_username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" id="adm-email" placeholder="admin@example.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <div class="pw-wrap">
            <input class="form-control" type="password" id="adm-password" placeholder="••••••••" autocomplete="current-password" />
            <button class="pw-toggle" type="button" onclick="togglePw('adm-password', this)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div id="adm-error" class="form-error" style="display:none"></div>
        <button class="btn btn-primary btn-full btn-lg" id="adm-login-btn" onclick="handleAdminLogin()">
          Access Admin Panel
        </button>
      </div>

      <div style="text-align:center;margin-top:1.25rem;font-size:0.78rem;color:var(--text-faint);">
        <a href="../index.html" style="color:var(--primary);font-weight:600;">← Back to User Login</a>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/api.js"></script>
  <script src="js/admin-auth.js"></script>
</body>
</html>
